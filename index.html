<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خضراوي إنترناشونال لإلحاق العمالة | Khadrawy International Recruitment</title>
</head>
<body style="margin:0;">
<div id="kir-root"></div>
<style>
  #kir-root{
    --charcoal:#14120E;
    --charcoal-2:#211D16;
    --gold:#C29A4B;
    --gold-bright:#E7C878;
    --gold-dim:#8C7238;
    --paper:#F7F4EE;
    --paper-2:#EFEAE0;
    --ink:#1B1811;
    --ink-soft:#5B5548;
    --white:#FFFFFF;
    --line: rgba(194,154,75,0.35);
    font-family:'Tajawal','IBM Plex Sans Arabic',sans-serif;
    color:var(--ink);
    background:var(--paper);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  #kir-root *{box-sizing:border-box; margin:0; padding:0;}
  #kir-root h1,#kir-root h2,#kir-root h3,#kir-root h4{
    font-family:'Cairo','Tajawal',sans-serif; font-weight:800; line-height:1.15;
  }
  #kir-root .eyebrow{
    font-family:'Cairo',sans-serif; font-weight:700; font-size:12.5px; letter-spacing:.16em;
    color:var(--gold-dim); text-transform:uppercase; display:flex; align-items:center; gap:10px;
  }
  #kir-root[dir="rtl"] .eyebrow{letter-spacing:.02em;}
  #kir-root .eyebrow::before{content:"";width:26px;height:1px;background:var(--gold);display:inline-block;}
  #kir-root a{color:inherit; text-decoration:none;}
  #kir-root button{font-family:inherit; cursor:pointer;}
  #kir-root .wrap{max-width:1180px; margin:0 auto; padding:0 28px;}
  #kir-root section{padding:96px 0;}
  #kir-root .dark{background:var(--charcoal); color:var(--paper);}
  #kir-root .dark .eyebrow{color:var(--gold-bright);}
  #kir-root .dark .eyebrow::before{background:var(--gold-bright);}

  /* ---------- NAV ---------- */
  #kir-root .nav{
    position:sticky; top:0; z-index:60; background:rgba(20,18,14,0.92);
    backdrop-filter:blur(10px); border-bottom:1px solid rgba(194,154,75,0.22);
  }
  #kir-root .nav-inner{max-width:1180px; margin:0 auto; padding:14px 28px; display:flex; align-items:center; justify-content:space-between; gap:20px;}
  #kir-root .brand{display:flex; align-items:center; gap:12px; color:var(--white);}
  #kir-root .brand-mark{
    width:44px; height:44px; border:1.5px solid var(--gold); border-radius:3px; display:flex; align-items:center; justify-content:center;
    font-family:'Cairo',sans-serif; font-weight:800; color:var(--gold-bright); font-size:15px; letter-spacing:.03em; position:relative;
  }
  #kir-root .brand-mark::after{content:"";position:absolute; inset:4px; border:1px solid rgba(194,154,75,0.35);}
  #kir-root .brand-txt{display:flex; flex-direction:column; line-height:1.25;}
  #kir-root .brand-txt b{font-family:'Cairo',sans-serif; font-weight:800; font-size:15.5px; color:var(--white);}
  #kir-root .brand-txt span{font-size:10.5px; color:var(--gold); letter-spacing:.08em;}
  #kir-root .nav-links{display:flex; gap:28px; align-items:center;}
  #kir-root .nav-links a{color:var(--paper); font-size:14.5px; font-weight:500; opacity:.82; transition:opacity .2s, color .2s; position:relative; padding:4px 0; cursor:pointer;}
  #kir-root .nav-links a:hover{opacity:1; color:var(--gold-bright);}
  #kir-root .nav-right{display:flex; align-items:center; gap:12px;}
  #kir-root .lang-switch{
    border:1px solid rgba(194,154,75,0.5); background:transparent; color:var(--gold-bright);
    padding:7px 13px; border-radius:20px; font-size:12.5px; font-weight:700; font-family:'Cairo',sans-serif;
    display:flex; align-items:center; gap:6px; transition:background .2s;
  }
  #kir-root .lang-switch:hover{background:rgba(194,154,75,0.12);}
  #kir-root .btn{
    display:inline-flex; align-items:center; gap:8px; font-family:'Cairo',sans-serif; font-weight:700; font-size:14px;
    padding:12px 24px; border-radius:2px; transition:transform .2s, box-shadow .2s, background .2s, color .2s; border:1px solid transparent;
  }
  #kir-root .btn-gold{background:linear-gradient(135deg,var(--gold-bright),var(--gold)); color:#1B1710;}
  #kir-root .btn-gold:hover{transform:translateY(-2px); box-shadow:0 10px 24px rgba(194,154,75,.35);}
  #kir-root .btn-ghost{border-color:rgba(247,244,238,0.35); color:var(--paper);}
  #kir-root .btn-ghost:hover{border-color:var(--gold-bright); color:var(--gold-bright);}
  #kir-root .btn-dark{background:var(--charcoal); color:var(--paper);}
  #kir-root .btn-dark:hover{background:var(--charcoal-2);}
  #kir-root .hamburger{display:none; flex-direction:column; gap:5px; background:none; border:none; padding:6px;}
  #kir-root .hamburger span{width:22px; height:2px; background:var(--gold-bright); display:block;}

  /* ---------- HERO ---------- */
  #kir-root .hero{
    position:relative; background:radial-gradient(ellipse at 30% 0%, #23200 -0%, transparent 0%), var(--charcoal);
    padding:120px 0 90px; overflow:hidden; border-bottom:1px solid rgba(194,154,75,0.18);
  }
  #kir-root .hero::before{
    content:""; position:absolute; inset:0; opacity:.5;
    background-image: linear-gradient(rgba(194,154,75,.06) 1px, transparent 1px), linear-gradient(90deg, rgba(194,154,75,.06) 1px, transparent 1px);
    background-size: 44px 44px; pointer-events:none;
  }
  #kir-root .hero-grid{position:relative; z-index:2; display:grid; grid-template-columns:1.15fr .85fr; gap:50px; align-items:center;}
  #kir-root .hero h1{color:var(--white); font-size:46px; margin:18px 0 22px; letter-spacing:-.01em;}
  #kir-root .hero h1 em{font-style:normal; color:var(--gold-bright);}
  #kir-root .hero p{color:#C9C4B6; font-size:17px; line-height:1.85; max-width:520px; margin-bottom:34px;}
  #kir-root .hero-ctas{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:40px;}
  #kir-root .hero-meta{display:flex; gap:26px; flex-wrap:wrap;}
  #kir-root .hero-meta div{display:flex; flex-direction:column; gap:2px;}
  #kir-root .hero-meta b{font-family:'Cairo',sans-serif; color:var(--gold-bright); font-size:20px;}
  #kir-root .hero-meta span{font-size:11.5px; color:#948C77; letter-spacing:.04em;}
  #kir-root .hero-art{position:relative; height:420px;}
  #kir-root .hero-art svg{width:100%; height:100%;}
  #kir-root .connect-line{stroke:var(--gold); stroke-width:1.4; fill:none; stroke-dasharray:340; stroke-dashoffset:340; animation:draw 2.4s ease forwards;}
  #kir-root .connect-line.d1{animation-delay:.2s;} #kir-root .connect-line.d2{animation-delay:.5s;}
  #kir-root .connect-line.d3{animation-delay:.8s;} #kir-root .connect-line.d4{animation-delay:1.1s;}
  #kir-root .node{fill:var(--charcoal); stroke:var(--gold-bright); stroke-width:1.4;}
  #kir-root .node-core{fill:var(--gold-bright);}
  #kir-root .node-pulse{fill:none; stroke:var(--gold-bright); stroke-width:1; opacity:0; animation:pulse 3s ease-out infinite;}
  @keyframes draw{to{stroke-dashoffset:0;}}
  @keyframes pulse{0%{opacity:.55; r:9;} 100%{opacity:0; r:34;}}

  /* ---------- divider device ---------- */
  #kir-root .kdiv{display:flex; align-items:center; gap:10px; justify-content:center; margin:0 auto 10px; width:fit-content;}
  #kir-root .kdiv i{width:26px; height:1px; background:var(--line);}
  #kir-root .kdiv b{width:6px; height:6px; border:1px solid var(--gold); transform:rotate(45deg); display:block;}

  /* ---------- section heads ---------- */
  #kir-root .shead{text-align:center; max-width:640px; margin:0 auto 56px;}
  #kir-root .shead .eyebrow{justify-content:center;}
  #kir-root .shead .eyebrow::before{display:none;}
  #kir-root .shead h2{font-size:32px; margin:14px 0 12px; color:var(--ink);}
  #kir-root .dark .shead h2{color:var(--white);}
  #kir-root .shead p{color:var(--ink-soft); font-size:15.5px; line-height:1.8;}
  #kir-root .dark .shead p{color:#C9C4B6;}

  /* ---------- about ---------- */
  #kir-root .about-grid{display:grid; grid-template-columns:.95fr 1.05fr; gap:60px; align-items:center;}
  #kir-root .about-card{background:var(--white); border:1px solid #E7E1D2; padding:34px; position:relative;}
  #kir-root .about-card::before{content:"";position:absolute; top:-10px; inset-inline-start:-10px; width:60px; height:60px; border-top:2px solid var(--gold); border-inline-start:2px solid var(--gold);}
  #kir-root .about-card p{color:var(--ink-soft); line-height:1.9; font-size:15px; margin-bottom:16px;}
  #kir-root .ceo-box{display:flex; gap:16px; align-items:center; margin-top:22px; padding-top:22px; border-top:1px dashed #DED6C1;}
  #kir-root .ceo-avatar{width:54px; height:54px; border-radius:50%; background:var(--charcoal); color:var(--gold-bright); display:flex; align-items:center; justify-content:center; font-family:'Cairo'; font-weight:800; flex-shrink:0;}
  #kir-root .ceo-box b{display:block; font-family:'Cairo'; font-size:14.5px; color:var(--ink);}
  #kir-root .ceo-box span{font-size:12.5px; color:var(--ink-soft);}
  #kir-root .about-stats{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  #kir-root .stat-tile{background:var(--charcoal); color:var(--white); padding:26px 20px; text-align:center;}
  #kir-root .stat-tile b{display:block; font-family:'Cairo'; font-size:30px; color:var(--gold-bright);}
  #kir-root .stat-tile span{font-size:12px; color:#B9B3A2; letter-spacing:.03em;}

  /* ---------- services / industries cards ---------- */
  #kir-root .grid-3{display:grid; grid-template-columns:repeat(3,1fr); gap:22px;}
  #kir-root .grid-4{display:grid; grid-template-columns:repeat(4,1fr); gap:18px;}
  #kir-root .card{background:var(--white); border:1px solid #E7E1D2; padding:30px 26px; transition:transform .25s, border-color .25s, box-shadow .25s;}
  #kir-root .card:hover{transform:translateY(-5px); border-color:var(--gold); box-shadow:0 16px 30px rgba(20,18,14,.08);}
  #kir-root .card .icn{width:44px; height:44px; border:1px solid var(--gold); display:flex; align-items:center; justify-content:center; color:var(--gold-dim); margin-bottom:18px; font-family:'Cairo'; font-weight:800;}
  #kir-root .card h3{font-size:17px; margin-bottom:9px; color:var(--ink);}
  #kir-root .card p{font-size:14px; color:var(--ink-soft); line-height:1.75;}
  #kir-root .industry-tile{background:var(--white); border:1px solid #E7E1D2; padding:22px 16px; text-align:center; transition:all .2s;}
  #kir-root .industry-tile:hover{border-color:var(--gold); background:var(--paper-2);}
  #kir-root .industry-tile .icn{width:38px; height:38px; margin:0 auto 12px; border-radius:50%; background:var(--charcoal); color:var(--gold-bright); display:flex; align-items:center; justify-content:center; font-family:'Cairo'; font-weight:800; font-size:13px;}
  #kir-root .industry-tile span{font-size:13.5px; font-weight:600; color:var(--ink);}

  /* ---------- process timeline ---------- */
  #kir-root .timeline{display:grid; grid-template-columns:repeat(6,1fr); gap:0; position:relative;}
  #kir-root .timeline::before{content:""; position:absolute; top:22px; inset-inline:4%; height:1px; background:linear-gradient(90deg, transparent, var(--gold) 10%, var(--gold) 90%, transparent);}
  #kir-root .tstep{text-align:center; padding:0 10px; position:relative;}
  #kir-root .tstep .num{
    width:44px; height:44px; border-radius:50%; background:var(--charcoal); color:var(--gold-bright); border:1px solid var(--gold);
    display:flex; align-items:center; justify-content:center; margin:0 auto 18px; font-family:'Cairo'; font-weight:800; position:relative; z-index:2;
  }
  #kir-root .tstep h4{font-size:14px; margin-bottom:6px; color:var(--white);}
  #kir-root .tstep p{font-size:12px; color:#A79F8B; line-height:1.6;}

  /* ---------- jobs ---------- */
  #kir-root .jobs-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:20px;}
  #kir-root .job-card{background:var(--white); border:1px solid #E7E1D2; padding:24px; transition:all .2s;}
  #kir-root .job-card:hover{border-color:var(--gold); box-shadow:0 14px 26px rgba(20,18,14,.07);}
  #kir-root .job-top{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px;}
  #kir-root .job-badge{font-size:10.5px; font-family:'Cairo'; font-weight:700; letter-spacing:.03em; background:var(--paper-2); color:var(--gold-dim); padding:5px 10px; border-radius:20px;}
  #kir-root .match-badge{font-size:10.5px; font-family:'Cairo'; font-weight:800; color:#2E7D4F; background:#E9F5EC; padding:5px 10px; border-radius:20px;}
  #kir-root .job-card h3{font-size:16.5px; margin-bottom:8px;}
  #kir-root .job-meta{display:flex; gap:14px; flex-wrap:wrap; font-size:12.5px; color:var(--ink-soft); margin-bottom:16px;}
  #kir-root .job-meta span{display:flex; align-items:center; gap:5px;}
  #kir-root .job-foot{display:flex; justify-content:space-between; align-items:center; padding-top:14px; border-top:1px solid #EEE8D9;}
  #kir-root .job-foot b{font-family:'Cairo'; color:var(--ink); font-size:14px;}
  #kir-root .job-foot a{font-size:13px; font-weight:700; color:var(--gold-dim); font-family:'Cairo';}
  #kir-root .job-foot a:hover{color:var(--gold);}

  /* filters (jobs page) */
  #kir-root .filters{display:flex; gap:14px; flex-wrap:wrap; background:var(--white); border:1px solid #E7E1D2; padding:20px; margin-bottom:36px;}
  #kir-root .filters select, #kir-root .filters input{
    flex:1; min-width:150px; border:1px solid #E2DBC8; background:var(--paper); padding:11px 14px; font-family:'Tajawal'; font-size:13.5px; color:var(--ink); border-radius:2px;
  }
  #kir-root .filters button{white-space:nowrap;}

  /* ---------- why us ---------- */
  #kir-root .why-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:22px;}
  #kir-root .why-tile{text-align:center; padding:10px;}
  #kir-root .why-tile .icn{width:58px; height:58px; border:1px solid rgba(194,154,75,.5); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 18px; color:var(--gold-bright); font-family:'Cairo'; font-weight:800;}
  #kir-root .why-tile h4{color:var(--white); font-size:15.5px; margin-bottom:8px;}
  #kir-root .why-tile p{color:#A79F8B; font-size:13px; line-height:1.7;}

  /* ---------- stats bar ---------- */
  #kir-root .stats-bar{display:grid; grid-template-columns:repeat(4,1fr); border:1px solid #E7E1D2; background:var(--white);}
  #kir-root .stats-bar div{padding:34px 20px; text-align:center; border-inline-end:1px solid #E7E1D2;}
  #kir-root .stats-bar div:last-child{border-inline-end:none;}
  #kir-root .stats-bar b{display:block; font-family:'Cairo'; font-size:36px; color:var(--gold-dim);}
  #kir-root .stats-bar span{font-size:12.5px; color:var(--ink-soft);}

  /* ---------- testimonials ---------- */
  #kir-root .tgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:22px;}
  #kir-root .tcard{background:var(--white); border:1px solid #E7E1D2; padding:28px;}
  #kir-root .tcard .stars{color:var(--gold); font-size:13px; margin-bottom:14px; letter-spacing:2px;}
  #kir-root .tcard p{font-size:14px; color:var(--ink-soft); line-height:1.8; margin-bottom:18px;}
  #kir-root .tperson{display:flex; align-items:center; gap:12px;}
  #kir-root .tperson .av{width:38px; height:38px; border-radius:50%; background:var(--charcoal); color:var(--gold-bright); display:flex; align-items:center; justify-content:center; font-family:'Cairo'; font-weight:700; font-size:13px;}
  #kir-root .tperson b{font-size:13.5px; display:block;}
  #kir-root .tperson span{font-size:11.5px; color:var(--ink-soft);}

  /* ---------- partners ---------- */
  #kir-root .partners-row{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:20px; opacity:.75;}
  #kir-root .partner-logo{font-family:'Cairo'; font-weight:800; font-size:16px; color:var(--ink-soft); border:1px solid #E7E1D2; padding:14px 26px; letter-spacing:.02em;}

  /* ---------- faq ---------- */
  #kir-root .faq-item{border-bottom:1px solid #E7E1D2; padding:20px 0; cursor:pointer;}
  #kir-root .faq-q{display:flex; justify-content:space-between; align-items:center; font-family:'Cairo'; font-weight:700; font-size:15px; color:var(--ink);}
  #kir-root .faq-q .plus{color:var(--gold-dim); font-size:20px; transition:transform .25s; font-weight:400;}
  #kir-root .faq-item.open .plus{transform:rotate(45deg);}
  #kir-root .faq-a{max-height:0; overflow:hidden; transition:max-height .3s ease; font-size:14px; color:var(--ink-soft); line-height:1.8;}
  #kir-root .faq-item.open .faq-a{max-height:200px; padding-top:12px;}

  /* ---------- contact ---------- */
  #kir-root .contact-grid{display:grid; grid-template-columns:.9fr 1.1fr; gap:50px;}
  #kir-root .cinfo-item{display:flex; gap:14px; margin-bottom:22px; align-items:flex-start;}
  #kir-root .cinfo-item .icn{width:38px; height:38px; border:1px solid var(--gold); flex-shrink:0; display:flex; align-items:center; justify-content:center; color:var(--gold-bright);}
  #kir-root .cinfo-item b{display:block; font-family:'Cairo'; font-size:14px; color:var(--white); margin-bottom:3px;}
  #kir-root .cinfo-item span{font-size:13px; color:#B9B3A2; line-height:1.6;}
  #kir-root .cform{background:var(--white); padding:30px;}
  #kir-root .cform input, #kir-root .cform select, #kir-root .cform textarea{
    width:100%; border:1px solid #E2DBC8; padding:13px 14px; font-family:'Tajawal'; font-size:14px; margin-bottom:14px; border-radius:2px; background:var(--paper);
  }
  #kir-root .cform textarea{resize:vertical; min-height:100px;}
  #kir-root .cform-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}

  /* ---------- footer ---------- */
  #kir-root footer{background:#0F0D0A; color:#8C8571; padding:60px 0 24px;}
  #kir-root .foot-grid{display:grid; grid-template-columns:1.4fr 1fr 1fr 1.2fr; gap:40px; padding-bottom:40px; border-bottom:1px solid rgba(194,154,75,.15);}
  #kir-root .foot-grid h5{color:var(--gold-bright); font-family:'Cairo'; font-size:13.5px; margin-bottom:16px; letter-spacing:.03em;}
  #kir-root .foot-grid ul{list-style:none;}
  #kir-root .foot-grid li{margin-bottom:10px; font-size:13.5px;}
  #kir-root .foot-grid li a:hover{color:var(--gold-bright);}
  #kir-root .foot-bottom{display:flex; justify-content:space-between; padding-top:22px; font-size:12.5px; flex-wrap:wrap; gap:10px;}

  /* ---------- misc pages: dashboard preview ---------- */
  #kir-root .db-shell{display:grid; grid-template-columns:230px 1fr; min-height:560px; border:1px solid #E7E1D2; background:var(--white);}
  #kir-root .db-side{background:var(--charcoal); color:#B9B3A2; padding:24px 16px;}
  #kir-root .db-side .item{padding:11px 14px; border-radius:4px; font-size:13.5px; margin-bottom:4px; display:flex; align-items:center; gap:10px; cursor:pointer;}
  #kir-root .db-side .item.active{background:rgba(194,154,75,.16); color:var(--gold-bright); font-weight:700;}
  #kir-root .db-main{padding:28px;}
  #kir-root .db-cards{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:26px;}
  #kir-root .db-card{border:1px solid #E7E1D2; padding:18px; position:relative; overflow:hidden;}
  #kir-root .db-card b{display:block; font-family:'Cairo'; font-size:26px;}
  #kir-root .db-card span{font-size:12px; color:var(--ink-soft);}
  #kir-root .db-table{width:100%; border-collapse:collapse; font-size:13px;}
  #kir-root .db-table th{text-align:start; padding:10px 12px; background:var(--paper-2); font-family:'Cairo'; font-size:11.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em;}
  #kir-root .db-table td{padding:12px; border-bottom:1px solid #EEE8D9;}
  #kir-root .pill{font-size:11px; font-family:'Cairo'; font-weight:700; padding:4px 10px; border-radius:20px;}
  #kir-root .pill.pending{background:#FCF0DA; color:#9A6B12;}
  #kir-root .pill.approved{background:#E4F3E8; color:#237C46;}
  #kir-root .pill.rejected{background:#FBE7E5; color:#B23B30;}

  #kir-root .note-banner{background:#FCF7EC; border:1px dashed var(--gold); padding:14px 18px; font-size:13px; color:#6B5527; margin-bottom:30px; display:flex; gap:10px; align-items:flex-start;}

  /* reveal */
  #kir-root .reveal{opacity:0; transform:translateY(18px); transition:opacity .6s ease, transform .6s ease;}
  #kir-root .reveal.show{opacity:1; transform:translateY(0);}

  @media (max-width:980px){
    #kir-root .nav-links, #kir-root .nav-right .btn-ghost{display:none;}
    #kir-root .hamburger{display:flex;}
    #kir-root .hero-grid{grid-template-columns:1fr;}
    #kir-root .hero-art{height:260px;}

    #kir-root .timeline::before{display:none;}
    #kir-root .db-shell{grid-template-columns:1fr;}
    #kir-root .db-cards{grid-template-columns:1fr;}
    #kir-root .foot-grid{grid-template-columns:1fr 1fr;}
    #kir-root .cform-row{grid-template-columns:1fr;}
  }
  @media (max-width:600px){
    #kir-root .hero h1{font-size:32px;}
    #kir-root .grid-3, #kir-root .jobs-grid, #kir-root .tgrid, #kir-root .grid-4, #kir-root .why-grid, #kir-root .stats-bar{grid-template-columns:1fr;}
    #kir-root section{padding:64px 0;}
    #kir-root .foot-grid{grid-template-columns:1fr;}
  }

  <section style="padding-top:60px;">
    <div class="wrap">
      <div class="shead" style="margin-bottom:34px;"><h2>${T.h1}</h2><p>${T.sub}</p></div>
      <div class="filters">
        <select><option>${T.country}</option><option>Qatar</option><option>UAE</option><option>Saudi Arabia</option><option>Egypt</option></select>
        <select><option>${T.category}</option>${(state.lang==='ar'?DATA.ar.industries.items:DATA.en.industries.items).map(x=>`<option>${x}</option>`).join('')}</select>
        <select><option>${T.exp}</option><option>0-2</option><option>3-5</option><option>5+</option></select>
        <input placeholder="${T.search}"/>
        <button class="btn btn-dark">${T.search}</button>
      </div>
      <p style="color:var(--ink-soft);font-size:13.5px;margin-bottom:18px;">${JOBS.length} ${T.results}</p>
      <div class="jobs-grid">${JOBS.map(jobCardHTML).join('')}</div>
    </div>
  </section>` + contactHTML();
}

function dashboardPage(){
  const T = t().dbPage;
  const jobsRows = JOBS.slice(0,5);
  const statuses = ['pending','approved','pending','approved','rejected'];
  const statusLabel = {pending:{ar:'قيد المراجعة',en:'Pending'}, approved:{ar:'معتمدة',en:'Approved'}, rejected:{ar:'مرفوضة',en:'Rejected'}};
  return `
  <section style="padding-top:50px;">
    <div class="wrap">
      <div class="note-banner"><span>ℹ️</span><span>${T.note}</span></div>
      <h2 style="font-size:24px;margin-bottom:24px;">${T.title}</h2>
      <div class="db-shell">
        <div class="db-side">
          ${T.nav.map((n,i)=>`<div class="item ${i===state.dbNav?'active':''}" data-dbnav="${i}">${n}</div>`).join('')}
        </div>
        <div class="db-main">
          <div class="db-cards">
            ${T.cards.map(c=>`<div class="db-card"><b>${c.n}</b><span>${c.l}</span></div>`).join('')}
          </div>
          <h4 style="font-family:'Cairo';font-size:15px;margin-bottom:14px;">${T.tableTitle}</h4>
          <table class="db-table">
            <thead><tr>${T.th.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
            <tbody>
              ${jobsRows.map((j,i)=>`
                <tr>
                  <td>${j[state.lang].title}</td>
                  <td>${state.lang==='ar'?'شركة تجريبية':'Sample Co.'} ${i+1}</td>
                  <td><span class="pill ${statuses[i]}">${statusLabel[statuses[i]][state.lang]}</span></td>
                  <td dir="ltr">2026-0${i+1}-1${i}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </section>`;
}

function pageHTML(){
  if(state.page==='jobs') return jobsPage();
  if(state.page==='dashboard') return dashboardPage();
  return homePage();
}

/* ---------------- render ---------------- */
const root = document.getElementById('kir-root');

function render(){
  root.setAttribute('dir', state.lang==='ar' ? 'rtl':'ltr');
  root.setAttribute('lang', state.lang);
  root.innerHTML = navHTML() + pageHTML() + footerHTML();
  bind();
  requestAnimationFrame(()=>{
    document.querySelectorAll('#kir-root .reveal').forEach(elx=>observer.observe(elx));
    document.querySelectorAll('#kir-root .counter').forEach(c=>counterObserver.observe(c));
  });
  window.scrollTo({top:0});
}

function bind(){
  root.querySelectorAll('[data-nav]').forEach(a=>{
    a.addEventListener('click', (e)=>{
      const p = a.getAttribute('data-nav');
      if(['home','jobs','dashboard'].includes(p)){ state.page = p; render(); }
      else {
        state.page='home'; render();
        setTimeout(()=>{ const t2=document.getElementById('sec-'+p); if(t2) t2.scrollIntoView({behavior:'smooth'}); }, 60);
      }
    });
  });
  const langBtn = root.querySelector('#langBtn');
  if(langBtn) langBtn.addEventListener('click', ()=>{ state.lang = state.lang==='ar'?'en':'ar'; render(); });
  const hamBtn = root.querySelector('#hamBtn');
  if(hamBtn) hamBtn.addEventListener('click', ()=>{
    const nl = root.querySelector('.nav-links');
    if(nl.style.display==='flex'){ nl.style.display='none'; }
    else { nl.style.display='flex'; nl.style.flexDirection='column'; nl.style.position='absolute'; nl.style.top='100%'; nl.style.insetInline='0'; nl.style.background='var(--charcoal)'; nl.style.padding='18px 28px'; }
  });
  root.querySelectorAll('[data-faq]').forEach(f=>{
    f.addEventListener('click', ()=>{ state.openFaq = state.openFaq===+f.dataset.faq ? -1 : +f.dataset.faq; render(); });
  });
  root.querySelectorAll('[data-dbnav]').forEach(d=>{
    d.addEventListener('click', ()=>{ state.dbNav = +d.dataset.dbnav; render(); });
  });
}

const observer = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('show'); observer.unobserve(e.target); } });
},{threshold:.12});

const counterObserver = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      const target = e.target.dataset.target;
      const numMatch = target.match(/[\d,]+/);
      if(numMatch){
        const num = parseInt(numMatch[0].replace(/,/g,''));
        const prefix = target.split(numMatch[0])[0];
        const suffix = target.split(numMatch[0])[1];
        let cur = 0; const dur=1400; const start=performance.now();
        function step(now){
          const p = Math.min(1,(now-start)/dur);
          cur = Math.floor(p*num);
          e.target.textContent = prefix + cur.toLocaleString() + suffix;
          if(p<1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }
      counterObserver.unobserve(e.target);
    }
  });
},{threshold:.4});

render();
})();
</script>
